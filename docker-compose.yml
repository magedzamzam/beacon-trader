# Beacon Trader — service topology.
# PostgreSQL is external/managed (set DATABASE_URL in .env). Redis is the
# in-cluster bus + heartbeat store. Workers expose /health on :8080.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  telegram:
    build:
      context: .
      dockerfile: services/telegram/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  monitor:
    build:
      context: .
      dockerfile: services/monitor/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  redis-data:

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "beacon-core"
version = "0.1.0"
description = "Beacon Trader shared core: brokers, parsing, risk, execution, strategy."
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27",
  "redis>=5.0",
  "aiohttp>=3.9",
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["beacon_core*"]
